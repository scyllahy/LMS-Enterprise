name: Deploy to Apps Script

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: apps-script-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run check
      - name: Configure clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          test -n "$CLASPRC_JSON"
          test -n "$CLASP_JSON"
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          printf '%s' "$CLASP_JSON" > .clasp.json
      - name: Push source
        run: npx clasp push --force
      - name: Update web app deployment
        env:
          CLASP_DEPLOYMENT_ID: ${{ secrets.CLASP_DEPLOYMENT_ID }}
        run: |
          test -n "$CLASP_DEPLOYMENT_ID"
          npx clasp deploy --deploymentId "$CLASP_DEPLOYMENT_ID" --description "GitHub ${GITHUB_SHA}"
