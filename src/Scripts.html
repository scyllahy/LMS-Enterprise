<script>
const state={token:sessionStorage.getItem('lmsToken')||'',user:null,school:'',quizzes:[],exam:null};
const $=id=>document.getElementById(id);
function server(action,payload={},token=state.token){return new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).apiCall(action,payload,token))}
function notify(message){$('toast').textContent=message;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2600)}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function unwrap(r){if(!r.success)throw new Error(r.error?.message||'เกิดข้อผิดพลาด');return r.data}
function setBusy(button,busy,text){button.disabled=busy;if(text)button.textContent=busy?'กำลังดำเนินการ...':text}
async function init(){google.script.run.withSuccessHandler(d=>{state.school=d.schoolName;$('school').textContent=d.schoolName;$('asideSchool').textContent=d.schoolName}).getInitialData();if(state.token){try{state.user=unwrap(await server('auth.me'));showApp()}catch(e){signOut(false)}}}
async function login(e){e.preventDefault();const b=$('loginButton');$('loginError').textContent='';setBusy(b,true,'เข้าสู่ระบบ');try{const d=unwrap(await server('auth.login',{username:$('username').value.trim(),password:$('password').value},''));state.token=d.token;state.user=d.user;sessionStorage.setItem('lmsToken',state.token);showApp()}catch(err){$('loginError').textContent=err.message}finally{setBusy(b,false,'เข้าสู่ระบบ')}}
function showApp(){$('loginView').classList.add('hidden');$('appView').classList.remove('hidden');$('displayName').textContent=state.user.displayName||state.user.username;$('role').textContent=roleName(state.user.role);$('avatar').textContent=(state.user.displayName||state.user.username||'?').slice(0,1);$('greeting').textContent=`สวัสดี ${state.user.displayName||state.user.username}`;loadHome()}
function roleName(r){return({SYSTEM_ADMIN:'ผู้ดูแลระบบ',SCHOOL_ADMIN:'ผู้ดูแลโรงเรียน',TEACHER:'ครู',STUDENT:'นักเรียน',PARENT:'ผู้ปกครอง'})[r]||r}
async function signOut(call=true){if(call&&state.token)try{await server('auth.logout')}catch(e){}state.token='';state.user=null;sessionStorage.removeItem('lmsToken');$('appView').classList.add('hidden');$('loginView').classList.remove('hidden');$('password').value=''}
async function loadHome(){activate('home');$('page').innerHTML='<div class="empty">กำลังโหลดข้อมูล...</div>';const [dash,quizzes]=await Promise.all([server('report.dashboard').catch(()=>null),server('quiz.available')]);state.quizzes=unwrap(quizzes);const d=dash&&dash.success?dash.data:null;const passwordCard=state.user.mustChangePassword?`<form class="card quiz" onsubmit="changePassword(event)"><h3>ตั้งรหัสผ่านใหม่</h3><p class="muted">บัญชีนี้ต้องเปลี่ยนรหัสผ่านก่อนเริ่มใช้งาน</p><input id="currentPassword" type="password" placeholder="รหัสผ่านปัจจุบัน" required> <input id="newPassword" type="password" minlength="12" placeholder="รหัสผ่านใหม่อย่างน้อย 12 ตัว" required> <button class="primary" style="width:auto">บันทึก</button></form>`:'';$('page').innerHTML=passwordCard+(d?`<div class="stats"><article class="card stat"><small>ผู้ใช้งาน</small><b>${d.users}</b></article><article class="card stat"><small>นักเรียน</small><b>${d.students}</b></article><article class="card stat"><small>แบบทดสอบ</small><b>${d.quizzes}</b></article><article class="card stat"><small>กำลังสอบ</small><b>${d.activeAttempts}</b></article></div>`:'')+quizSection(state.quizzes.slice(0,6),'แบบทดสอบที่เปิดอยู่')}
async function changePassword(e){e.preventDefault();const b=e.submitter;setBusy(b,true,'บันทึก');try{unwrap(await server('auth.change-password',{currentPassword:$('currentPassword').value,newPassword:$('newPassword').value}));state.user.mustChangePassword=false;notify('เปลี่ยนรหัสผ่านแล้ว');loadHome()}catch(err){notify(err.message)}finally{setBusy(b,false,'บันทึก')}}
async function loadQuizzes(){activate('quizzes');$('page').innerHTML='<div class="empty">กำลังโหลดข้อมูล...</div>';try{state.quizzes=unwrap(await server('quiz.available'));$('page').innerHTML=quizSection(state.quizzes,'แบบทดสอบทั้งหมด')}catch(e){$('page').innerHTML=`<div class="empty">${esc(e.message)}</div>`}}
function quizSection(items,title){return `<div class="section-title"><div><span class="eyebrow">LEARNING</span><h3>${title}</h3></div><small>${items.length} รายการ</small></div>`+(items.length?`<div class="quiz-grid">${items.map(q=>`<article class="card quiz"><small>${esc(q.subjectId||'แบบทดสอบ')}</small><h3>${esc(q.title||q.quizName||'ไม่มีชื่อ')}</h3><p class="muted">${esc(q.description||'พร้อมสำหรับการทำแบบทดสอบ')}</p><footer><small>${q.timeLimitMinutes?esc(q.timeLimitMinutes)+' นาที':'ไม่จำกัดเวลา'}</small>${state.user.role==='STUDENT'?`<button class="primary" onclick="startExam('${esc(q.quizId)}')">เริ่มทำ</button>`:''}</footer></article>`).join('')}</div>`:'<div class="empty">ยังไม่มีแบบทดสอบที่เปิดให้ทำ</div>')}
function activate(page){document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x.dataset.page===page))}
async function startExam(id){try{const data=unwrap(await server('exam.start',{quizId:id}));state.exam=data;renderExam()}catch(e){notify(e.message)}}
function renderExam(){const e=state.exam;$('examContent').innerHTML=`<span class="eyebrow">EXAM</span><h2>${esc(e.quiz.title||e.quiz.quizName||'แบบทดสอบ')}</h2><p class="muted">ตอบคำถามให้ครบก่อนส่งคำตอบ</p><form id="examForm">${e.questions.map((q,i)=>renderQuestion(q,i)).join('')}<div class="exam-actions"><button type="button" class="secondary" onclick="closeExam()">พักไว้ก่อน</button><button class="primary" type="submit">ส่งคำตอบ</button></div></form>`;$('examForm').addEventListener('submit',submitExam);$('examModal').classList.remove('hidden')}
function renderQuestion(q,i){const raw=q.choicesJson||q.optionsJson||[],opts=Array.isArray(raw)?raw:(raw.options||[]);return `<div class="question"><strong>${i+1}. ${esc(q.questionText||q.text||'คำถาม')}</strong>${opts.length?opts.map((o,j)=>{const value=typeof o==='object'?(o.value??o.key??j):o,label=typeof o==='object'?(o.label??o.text??value):o;return `<label><input type="radio" name="q_${esc(q.questionId)}" value="${esc(value)}"> ${esc(label)}</label>`}).join(''):`<label><input name="q_${esc(q.questionId)}" placeholder="พิมพ์คำตอบ"></label>`}</div>`}
async function submitExam(ev){ev.preventDefault();const b=ev.submitter;setBusy(b,true,'ส่งคำตอบ');try{for(const q of state.exam.questions){const input=document.querySelector(`[name="q_${CSS.escape(q.questionId)}"]:checked`)||document.querySelector(`[name="q_${CSS.escape(q.questionId)}"]`);await server('exam.save-answer',{attemptId:state.exam.attempt.attemptId,questionId:q.questionId,answerJson:{value:input?input.value:''}}).then(unwrap)}const result=unwrap(await server('exam.submit',{attemptId:state.exam.attempt.attemptId}));closeExam();notify(`ส่งข้อสอบแล้ว คะแนน ${result.percentage??0}%`);loadHome()}catch(e){notify(e.message)}finally{setBusy(b,false,'ส่งคำตอบ')}}
function closeExam(){$('examModal').classList.add('hidden')}
$('loginForm').addEventListener('submit',login);$('logoutButton').addEventListener('click',()=>signOut());$('refreshButton').addEventListener('click',loadHome);document.querySelectorAll('.nav').forEach(x=>x.addEventListener('click',()=>x.dataset.page==='quizzes'?loadQuizzes():loadHome()));init();
</script>
