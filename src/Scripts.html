<script>
const state={token:sessionStorage.getItem('lmsToken')||'',user:null,school:'',data:{},exam:null,page:'home',academicYear:'2569'};
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let richEditorSeq=0;
function safeRich(v){const t=document.createElement('template');t.innerHTML=String(v??'');[...t.content.querySelectorAll('*')].forEach(el=>{const tag=el.tagName;if(!['B','STRONG','I','EM','U','BR','IMG'].includes(tag)){el.replaceWith(document.createTextNode(el.textContent||''));return}const imageSrc=tag==='IMG'?el.getAttribute('src')||'':'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='IMG'){let ok=false,u;try{u=new URL(imageSrc,location.href);ok=u.protocol==='https:'&&u.hostname==='drive.google.com'&&u.pathname==='/uc'&&u.searchParams.get('export')==='view'&&/^[A-Za-z0-9_-]+$/.test(u.searchParams.get('id')||'')}catch(e){}if(!ok){el.remove();return}el.setAttribute('src',u.href);el.setAttribute('alt','รูปประกอบคำถาม');el.setAttribute('loading','lazy')}});return t.innerHTML}
function richEditor(name,value='',placeholder='พิมพ์ข้อความ',quizId=''){const id='richEditor'+(++richEditorSeq);return `<div class="rich-field"><div class="rich-toolbar"><button type="button" title="ตัวหนา" onclick="richCommand(this,'bold')"><b>B</b></button><button type="button" title="ตัวเอียง" onclick="richCommand(this,'italic')"><i>I</i></button><button type="button" title="ขีดเส้นใต้" onclick="richCommand(this,'underline')"><u>U</u></button><button type="button" title="เพิ่มรูป" onclick="this.parentElement.querySelector('input[type=file]').click()">รูปภาพ</button><input type="file" accept="image/png,image/jpeg,image/gif,image/webp" class="hidden" onchange="uploadRichImage(event,'${esc(quizId)}')"></div><div id="${id}" class="rich-editor" contenteditable="true" data-placeholder="${esc(placeholder)}" oninput="syncRichEditor(this)">${safeRich(value)}</div><input type="hidden" name="${esc(name)}" value="${esc(value)}"></div>`}
function richCommand(button,command){const editor=button.closest('.rich-field').querySelector('.rich-editor');editor.focus();document.execCommand(command,false,null);syncRichEditor(editor)}
function syncRichEditor(editor){editor.closest('.rich-field').querySelector('input[type=hidden]').value=editor.innerHTML.trim()}
function syncRichFields(form){form.querySelectorAll('.rich-editor').forEach(syncRichEditor)}
async function uploadRichImage(e,quizId){const file=e.target.files&&e.target.files[0],field=e.target.closest('.rich-field'),editor=field&&field.querySelector('.rich-editor');e.target.value='';if(!file||!editor)return;if(file.size>2*1024*1024)return notify('รูปภาพต้องมีขนาดไม่เกิน 2 MB');if(!['image/png','image/jpeg','image/gif','image/webp'].includes(file.type))return notify('รองรับเฉพาะ PNG, JPEG, GIF หรือ WebP');try{const dataUrl=await new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(reader.result);reader.onerror=()=>reject(new Error('อ่านไฟล์ไม่สำเร็จ'));reader.readAsDataURL(file)}),uploaded=unwrap(await server('quiz.upload-image',{quizId:quizId,dataUrl:dataUrl})),html=`<img src="${esc(uploaded.url)}" alt="รูปประกอบคำถาม" loading="lazy">`;editor.focus();if(!document.execCommand('insertHTML',false,html))editor.insertAdjacentHTML('beforeend',html);syncRichEditor(editor);notify('เพิ่มรูปแล้ว')}catch(x){notify(x.message)}}
function server(action,payload={},token=state.token){const ttl={"academic-year.list":60000,"class.list":30000,"subject.list":30000,"teacher.list":60000}[action],key=action+':'+String(payload.academicYear||'all');if(ttl&&token&&state.user){const hit=clientCacheGet(key,ttl);if(hit!==null)return Promise.resolve({success:true,data:hit})}return new Promise((resolve,reject)=>google.script.run.withSuccessHandler(r=>{if(r&&r.success){if(ttl&&token&&state.user)clientCacheSet(key,r.data);const invalidations={"academic-year.add":['academic-year.list'],"class.create":['academic-year.list','class.list'],"class.update":['academic-year.list','class.list'],"class.delete":['academic-year.list','class.list'],"subject.create":['academic-year.list','subject.list'],"subject.update":['academic-year.list','subject.list'],"user.create":['teacher.list','subject.list'],"user.status":['teacher.list','subject.list'],"quiz.create":['academic-year.list'],"quiz.clone":['academic-year.list']}[action];if(invalidations)clientCacheInvalidate(...invalidations)}resolve(r)}).withFailureHandler(reject).apiCall(action,payload,token))}
const CLIENT_CACHE_PREFIX='lms-ref-v1:';
let navigationRunning=false,navigationPending='';
function clientCacheKey(key){return CLIENT_CACHE_PREFIX+(state.user?.userId||'guest')+':'+key}
function clientCacheGet(key,ttl){try{const raw=localStorage.getItem(clientCacheKey(key));if(!raw)return null;const item=JSON.parse(raw);if(!item||Date.now()-item.savedAt>ttl){localStorage.removeItem(clientCacheKey(key));return null}return item.value}catch(e){return null}}
function clientCacheSet(key,value){try{localStorage.setItem(clientCacheKey(key),JSON.stringify({savedAt:Date.now(),value:value}))}catch(e){}}
function clientCacheInvalidate(){const prefixes=[...arguments],root=CLIENT_CACHE_PREFIX+(state.user?.userId||'guest')+':';try{for(let i=localStorage.length-1;i>=0;i--){const key=localStorage.key(i);if(key&&key.startsWith(root)&&prefixes.some(x=>key.slice(root.length).startsWith(x)))localStorage.removeItem(key)}}catch(e){}}
function unwrap(r){if(!r||!r.success)throw new Error(r&&r.error?.message||'ไม่ได้รับคำตอบจากเซิร์ฟเวอร์ กรุณาลองใหม่');return r.data}
function notify(m){$('toast').textContent=m;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2800)}
function busy(b,on,label){if(!b)return;b.disabled=on;if(label)b.textContent=on?'กำลังบันทึก...':label}
function roleName(r){return({SYSTEM_ADMIN:'ผู้ดูแลระบบ',SCHOOL_ADMIN:'ผู้ดูแลโรงเรียน',TEACHER:'ครู',STUDENT:'นักเรียน',PARENT:'ผู้ปกครอง'})[r]||r}
function can(...roles){return roles.includes(state.user?.role)}
function yearPayload(){return{academicYear:state.academicYear}}
function currentAcademicYear(){return state.academicYear==='ALL'?'2569':state.academicYear}
function changeAcademicYear(e){state.academicYear=e.target.value;delete state.data.subjects;delete state.data.classes;delete state.data.quizzes;delete state.data.students;go(state.page)}
async function loadAcademicYears(){try{const years=unwrap(await server('academic-year.list')),select=$('academicYear');select.innerHTML=years.map(y=>`<option value="${esc(y)}">${esc(y)}</option>`).join('')+'<option value="ALL">ทุกปี</option>';select.value=years.includes(state.academicYear)?state.academicYear:'2569'}catch(e){}}
async function addAcademicYear(){const year=prompt('ระบุปีการศึกษา พ.ศ. เช่น 2570');if(year===null)return;try{const r=unwrap(await server('academic-year.add',{academicYear:year.trim()}));state.academicYear=r.academicYear;await loadAcademicYears();$('academicYear').value=state.academicYear;notify('เพิ่มปีการศึกษา '+r.academicYear+' แล้ว');classes()}catch(x){notify(x.message)}}
async function cloneQuiz(id){const q=(state.data.quizzes||[]).find(x=>x.quizId===id);if(!q)return notify('ไม่พบแบบทดสอบ');const defaultYear=state.academicYear==='ALL'?'2569':state.academicYear,year=prompt('คัดลอกไปปีการศึกษา พ.ศ.',defaultYear);if(year===null)return;const title=prompt('ชื่อแบบทดสอบฉบับใหม่',q.title);if(title===null)return;try{const copy=unwrap(await server('quiz.clone',{quizId:id,academicYear:year.trim(),title:title.trim()}));state.academicYear=copy.academicYear;await loadAcademicYears();$('academicYear').value=state.academicYear;notify('คัดลอกข้อสอบและคำถามแล้ว');quizzes()}catch(x){notify(x.message)}}
async function init(){google.script.run.withSuccessHandler(d=>{state.school=d.schoolName;$('school').textContent=d.schoolName;$('asideSchool').textContent=d.schoolName}).getInitialData();if(state.token)try{state.user=unwrap(await server('auth.me'));showApp()}catch(e){signOut(false)}}
async function login(e){e.preventDefault();const b=$('loginButton');busy(b,true,'เข้าสู่ระบบ');$('loginError').textContent='';try{const d=unwrap(await server('auth.login',{username:$('username').value.trim(),password:$('password').value},''));state.token=d.token;state.user=d.user;sessionStorage.setItem('lmsToken',state.token);showApp()}catch(x){$('loginError').textContent=x.message}finally{busy(b,false,'เข้าสู่ระบบ')}}
async function signOut(call=true){if(call)try{await server('auth.logout')}catch(e){}state.token='';state.user=null;sessionStorage.removeItem('lmsToken');$('appView').classList.add('hidden');$('loginView').classList.remove('hidden');$('password').value=''}
function showApp(){$('loginView').classList.add('hidden');$('appView').classList.remove('hidden');$('displayName').textContent=state.user.displayName||state.user.username;$('role').textContent=roleName(state.user.role);$('avatar').textContent=(state.user.displayName||state.user.username)[0];$('greeting').textContent=`สวัสดี ${state.user.displayName||state.user.username}`;$('academicYear').value=state.academicYear;$('academicYear').onchange=changeAcademicYear;loadAcademicYears();renderNav();go('home')}
function renderNav(){const all={home:'ภาพรวม',users:'ผู้ใช้งาน',students:'เพิ่มนักเรียน',classes:'ห้องเรียน',subjects:'รายวิชา',quizzes:'แบบทดสอบ',scores:'ผลคะแนน',system:'สถานะระบบ'},r=state.user.role;let pages=['home'];if(['SYSTEM_ADMIN','SCHOOL_ADMIN'].includes(r))pages.push('users','students','classes','subjects','quizzes','scores','system');if(r==='TEACHER')pages.push('classes','subjects','quizzes','scores');if(r==='STUDENT')pages.push('quizzes','scores');if(r==='PARENT')pages.push('scores');$('mainNav').innerHTML=pages.map(p=>`<button class="nav" data-page="${p}">${all[p]}</button>`).join('');document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>go(b.dataset.page))}
async function go(page){navigationPending=page;if(navigationRunning)return;navigationRunning=true;while(navigationPending){const target=navigationPending;navigationPending='';state.page=target;document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.page===target));$('page').innerHTML='<div class="empty">กำลังโหลดข้อมูล...</div>';try{if(target==='home')await home();if(target==='users')await users();if(target==='students')await students();if(target==='classes')await classes();if(target==='subjects')await subjects();if(target==='quizzes')await quizzes();if(target==='scores')await scores();if(target==='system')await system()}catch(e){$('page').innerHTML=`<div class="empty error">${esc(e.message)}</div>`}}navigationRunning=false}
function title(k,t,action=''){return `<div class="section-title"><div><span class="eyebrow">${k}</span><h3>${t}</h3></div>${action}</div>`}
function empty(t){return `<div class="empty">${t}</div>`}
function table(headers,rows){return `<div class="table-wrap"><table><thead><tr>${headers.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table></div>`}
async function home(){const [dash,available]=await Promise.all([server('report.dashboard',yearPayload()).catch(()=>null),server('quiz.available',yearPayload())]);const d=dash?.success?dash.data:null,q=unwrap(available);$('page').innerHTML=(state.user.mustChangePassword?passwordForm():'')+(d?`<div class="stats"><article class="card stat"><small>ผู้ใช้งาน</small><b>${d.users}</b></article><article class="card stat"><small>นักเรียน</small><b>${d.students}</b></article><article class="card stat"><small>แบบทดสอบ</small><b>${d.quizzes}</b></article><article class="card stat"><small>กำลังสอบ</small><b>${d.activeAttempts}</b></article></div>`:'')+quizCards(q.slice(0,6),'แบบทดสอบที่เปิดอยู่')}
function passwordForm(){return `<form class="card form-card" onsubmit="changePassword(event)"><h3>เปลี่ยนรหัสผ่านก่อนใช้งาน</h3><div class="form-grid"><input id="currentPassword" type="password" placeholder="รหัสผ่านปัจจุบัน" required><input id="newPassword" type="password" minlength="12" placeholder="รหัสผ่านใหม่อย่างน้อย 12 ตัว" required><button class="primary">บันทึก</button></div></form>`}
async function changePassword(e){e.preventDefault();const b=e.submitter;busy(b,true,'บันทึก');try{unwrap(await server('auth.change-password',{currentPassword:$('currentPassword').value,newPassword:$('newPassword').value}));state.user.mustChangePassword=false;notify('เปลี่ยนรหัสผ่านแล้ว');home()}catch(x){notify(x.message)}finally{busy(b,false,'บันทึก')}}
async function users(){const [us,cs]=await Promise.all([server('user.list').then(unwrap),server('class.list',yearPayload()).then(unwrap)]);state.data.classes=cs;$('page').innerHTML=title('ADMIN','จัดการผู้ใช้งาน','<span><button class="secondary" onclick="go(\'students\')">นำเข้านักเรียน</button> <button class="primary fit" onclick="showUserForm()">+ เพิ่มผู้ใช้</button></span>')+table(['ชื่อผู้ใช้','ชื่อ','อีเมล','บทบาท','สถานะ'],us.map(u=>`<tr><td>${esc(u.username)}</td><td>${esc(u.displayName)}</td><td>${esc(u.email)}</td><td><span class="badge">${roleName(u.role)}</span></td><td>${esc(u.status)}</td></tr>`))}
function showUserForm(){$('page').innerHTML=title('ADMIN','เพิ่มผู้ใช้งาน')+`<form class="card form-card" onsubmit="createUser(event)"><div class="form-grid"><label>ชื่อผู้ใช้<input name="username" required></label><label>ชื่อแสดง<input name="displayName" required></label><label>อีเมล<input name="email" type="email"></label><label>บทบาท<select name="role"><option value="STUDENT">นักเรียน</option><option value="TEACHER">ครู</option><option value="PARENT">ผู้ปกครอง</option><option value="SCHOOL_ADMIN">ผู้ดูแลโรงเรียน</option></select></label><label>รหัสผ่านเริ่มต้น<input name="password" type="password" minlength="12" required></label><label>ห้องเรียน<select name="classId"><option value="">ไม่ระบุ</option>${(state.data.classes||[]).map(x=>`<option value="${x.classId}">${esc(x.className)}</option>`)}</select></label><label>รหัสนักเรียน/ครู<input name="code"></label><label>อีเมลผู้ปกครอง<input name="parentEmail" type="email"></label></div><div class="actions"><button type="button" class="secondary" onclick="users()">ยกเลิก</button><button class="primary fit">สร้างบัญชี</button></div></form>`}
async function createUser(e){e.preventDefault();const f=new FormData(e.target),p=Object.fromEntries(f);p.studentCode=p.role==='STUDENT'?p.code:'';p.teacherCode=p.role==='TEACHER'?p.code:'';try{unwrap(await server('user.create',p));notify('สร้างผู้ใช้แล้ว');users()}catch(x){notify(x.message)}}
async function students(){const [rows,classes]=await Promise.all([server('student.list',yearPayload()).then(unwrap),server('class.list',yearPayload()).then(unwrap)]);state.data.students=rows;state.data.classes=classes;state.data.studentImport=[];$('page').innerHTML=title('ADMIN','เพิ่มนักเรียน','<button class="secondary" onclick="downloadStudentTemplate()">ดาวน์โหลดไฟล์ตัวอย่าง CSV</button>')+`<section class="card form-card import-panel"><h3>นำเข้ารายชื่อนักเรียน</h3><p class="muted">ดาวน์โหลดไฟล์ตัวอย่าง แก้ไขด้วย Excel หรือ Google Sheets แล้วบันทึกเป็น CSV UTF-8 ก่อนอัปโหลด ระบบจะให้ผู้เรียนเปลี่ยนรหัสผ่านเมื่อเข้าสู่ระบบครั้งแรก</p><div class="import-actions"><label class="file-button">เลือกไฟล์ CSV<input type="file" accept=".csv,text/csv" onchange="readStudentCsv(event)"></label><button class="primary fit" id="importStudentsButton" onclick="importStudents()" disabled>นำเข้าข้อมูล</button></div><div id="studentImportPreview"></div></section>`+(classes.length?title('REFERENCE','รหัสห้องเรียน')+table(['รหัสห้องเรียน','ชื่อห้อง','ระดับชั้น'],classes.map(x=>`<tr><td>${esc(x.classId)}</td><td>${esc(x.className)}</td><td>${esc(x.gradeLevel)}</td></tr>`)):'')+title('STUDENTS','นักเรียนในระบบ',`<small>${rows.length} คน</small>`)+(rows.length?table(['รหัสนักเรียน','ชื่อ','ชื่อผู้ใช้','ห้อง','เลขที่'],rows.map(x=>`<tr><td>${esc(x.studentCode)}</td><td>${esc(x.displayName)}</td><td>${esc(x.username)}</td><td>${esc(x.className||'-')}</td><td>${esc(x.number||'-')}</td></tr>`)):empty('ยังไม่มีนักเรียน'))}
function csvCell(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function downloadStudentTemplate(){const c=(state.data.classes||[])[0],rows=[['username','displayName','password','email','studentCode','classId','number','parentEmail'],['student001','ด.ช. ตัวอย่าง นักเรียน','ChangeMe1234!','student001@example.com','S001',c?c.classId:'','1','parent@example.com']],csv='\uFEFF'+rows.map(r=>r.map(csvCell).join(',')).join('\r\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='student-import-template.csv';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function parseCsv(text){const out=[],row=[];let cell='',quoted=false;for(let i=0;i<text.length;i++){const ch=text[i];if(quoted){if(ch==='"'&&text[i+1]==='"'){cell+='"';i++}else if(ch==='"')quoted=false;else cell+=ch}else if(ch==='"')quoted=true;else if(ch===','){row.push(cell);cell=''}else if(ch==='\n'){row.push(cell);out.push(row.splice(0));cell=''}else if(ch!=='\r')cell+=ch}if(cell||row.length){row.push(cell);out.push(row)}return out}
function readStudentCsv(e){const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const matrix=parseCsv(String(reader.result||'').replace(/^\uFEFF/,'')),headers=(matrix.shift()||[]).map(x=>x.trim()),required=['username','displayName','password','email','studentCode','classId','number','parentEmail'];if(required.some(x=>!headers.includes(x)))throw new Error('หัวตารางไม่ครบ กรุณาใช้ไฟล์ตัวอย่าง');const rows=matrix.filter(r=>r.some(Boolean)).map(r=>Object.fromEntries(headers.map((h,i)=>[h,String(r[i]||'').trim()])));if(!rows.length)throw new Error('ไม่พบข้อมูลนักเรียน');if(rows.length>300)throw new Error('นำเข้าได้ครั้งละไม่เกิน 300 คน');state.data.studentImport=rows;$('studentImportPreview').innerHTML=`<p><strong>ตรวจพบ ${rows.length} คน</strong> กรุณาตรวจสอบก่อนนำเข้า</p>`+table(['รหัสนักเรียน','ชื่อ','ชื่อผู้ใช้','ห้อง','เลขที่'],rows.slice(0,20).map(x=>`<tr><td>${esc(x.studentCode)}</td><td>${esc(x.displayName)}</td><td>${esc(x.username)}</td><td>${esc(x.classId||'-')}</td><td>${esc(x.number||'-')}</td></tr>`))+(rows.length>20?'<p class="muted">แสดงตัวอย่าง 20 รายการแรก</p>':'');$('importStudentsButton').disabled=false}catch(x){state.data.studentImport=[];$('importStudentsButton').disabled=true;$('studentImportPreview').innerHTML=`<p class="error">${esc(x.message)}</p>`}};reader.onerror=()=>notify('อ่านไฟล์ไม่สำเร็จ');reader.readAsText(file,'UTF-8')}
async function importStudents(){const rows=state.data.studentImport||[];if(!rows.length)return notify('กรุณาเลือกไฟล์ CSV');if(!confirm(`ยืนยันนำเข้านักเรียน ${rows.length} คน?`))return;const b=$('importStudentsButton');busy(b,true,'นำเข้าข้อมูล');try{const r=unwrap(await server('student.import',{rows:rows,academicYear:state.academicYear}));notify(`เพิ่มนักเรียนแล้ว ${r.created} คน`);students()}catch(x){notify(x.message);busy(b,false,'นำเข้าข้อมูล')}}
async function classes(){const rows=await server('class.list',yearPayload()).then(unwrap),manage=can('SYSTEM_ADMIN','SCHOOL_ADMIN');state.data.classes=rows;$('page').innerHTML=title('ACADEMIC','ห้องเรียน',manage?'<span><button class="secondary" onclick="addAcademicYear()">+ เพิ่มปีการศึกษา</button> <button class="primary fit" onclick="showClassForm()">+ เพิ่มห้อง</button></span>':'')+(rows.length?table(['ห้อง','ระดับชั้น','ปีการศึกษา',...(manage?['จัดการ']:[])],rows.map(x=>`<tr><td>${esc(x.className)}</td><td>${esc(x.gradeLevel)}</td><td>${esc(x.academicYear)}</td>${manage?`<td><button class="secondary" onclick="showEditClass('${x.classId}')">แก้ไข</button> <button class="danger-button" onclick="deleteClass('${x.classId}','${esc(x.className)}')">ลบ</button></td>`:''}</tr>`)):empty('ยังไม่มีห้องเรียน'))}
function showClassForm(){$('page').innerHTML=title('ACADEMIC','เพิ่มห้องเรียน')+`<form class="card form-card" onsubmit="createClass(event)"><div class="form-grid"><label>ชื่อห้อง<input name="className" required></label><label>ระดับชั้น<input name="gradeLevel" required></label><label>ปีการศึกษา<input name="academicYear" required></label></div><div class="actions"><button class="primary fit">บันทึก</button></div></form>`}

function quizCards(items,label,manage=false){return title('LEARNING',label,`<small>${items.length} รายการ</small>`)+(items.length?`<div class="quiz-grid">${items.map(q=>`<article class="card quiz"><small>${q.published?'เผยแพร่แล้ว':'ฉบับร่าง'} · ปี ${esc(q.academicYear||'2569')}</small><h3>${esc(q.title)}</h3><p class="muted">${esc(q.description||'ไม่มีคำอธิบาย')}</p><p class="quiz-owner">ผู้จัดทำ: <strong>${esc(q.ownerName||'ไม่ระบุ')}</strong></p><footer><small>${q.timeLimitMinutes?esc(q.timeLimitMinutes)+' นาที':'ไม่จำกัดเวลา'}</small>${state.user.role==='STUDENT'?`<button class="primary fit" onclick="startExam('${q.quizId}')">เริ่มทำ</button>`:manage?`<span><button class="secondary" onclick="viewQuiz('${q.quizId}')">ดูข้อสอบ</button> <button class="secondary" onclick="showEditQuiz('${q.quizId}')">แก้ไข</button> <button class="secondary" onclick="cloneQuiz('${q.quizId}')">คัดลอกไปปีอื่น</button> <button class="secondary" onclick="showQuestionForm('${q.quizId}')">+ คำถาม</button> <button class="${q.published?'danger-button':'primary fit'}" onclick="setQuizPublication('${q.quizId}',${!q.published})">${q.published?'ยกเลิกเผยแพร่':'เผยแพร่'}</button> <button class="danger-button" onclick="deleteQuiz('${q.quizId}')">ลบ</button></span>`:''}</footer></article>`).join('')}</div>`:empty('ยังไม่มีแบบทดสอบ'))}
async function viewQuiz(id){$('page').innerHTML=empty('กำลังโหลดข้อสอบ...');try{const d=unwrap(await server('quiz.detail',{quizId:id})),q=d.quiz,items=d.questions||[];state.data.quizDetail=d;$('page').innerHTML=title('QUIZ BUILDER',esc(q.title),`<span><button class="secondary" onclick="quizzes()">กลับ</button> <button class="primary fit" onclick="showQuestionForm('${id}')">+ เพิ่มคำถาม</button></span>`)+`<div class="builder-hero"><textarea readonly>${esc(q.description||'ไม่มีคำอธิบาย')}</textarea><div class="quiz-meta"><span>ผู้จัดทำ: ${esc(q.ownerName||'ไม่ระบุ')}</span><span>${esc(q.timeLimitMinutes||0)} นาที</span><span>ทำได้ ${esc(q.attemptLimit||1)} ครั้ง</span><span>ผ่าน ${esc(q.passPercentage||0)}%</span><span>${q.published?'เผยแพร่แล้ว':'ฉบับร่าง'}</span></div></div>`+(items.length?`<div class="question-list">${items.map((x,i)=>questionBuilderCard(x,i,id)).join('')}</div>`:empty('ยังไม่มีคำถามในแบบทดสอบนี้'))+`<button class="add-question-bar" onclick="showQuestionForm('${id}')">＋ เพิ่มคำถามใหม่</button>`}catch(x){$('page').innerHTML=empty(esc(x.message))}}
function questionBuilderCard(x,i,quizId){const choices=Array.isArray(x.choicesJson)?x.choicesJson:[],correct=x.correctAnswerJson?.value??'',questionNumber=x.sortOrder||i+1;return `<article class="card question-card builder-card"><div class="builder-accent"></div><header><span class="question-number">${esc(questionNumber)}</span><div><div class="rich-content">${safeRich(x.questionText)}</div><small>${esc(x.questionType)} · ${esc(x.score)} คะแนน · ข้อ ${esc(questionNumber)}</small></div><div class="card-tools"><button class="secondary" onclick="editQuestion('${x.questionId}')">แก้ไข</button><button class="danger-button" onclick="deleteQuestion('${x.questionId}','${quizId}')">ลบ</button></div></header>${choices.length?`<ol>${choices.map(c=>`<li class="${String(c)===String(correct)?'correct-choice':''}"><span class="rich-content">${safeRich(c)}</span>${String(c)===String(correct)?' <b>✓ เฉลย</b>':''}</li>`).join('')}</ol>`:`<p class="answer-key"><b>เฉลย:</b> ${x.questionType==='ESSAY'?'ตรวจโดยครู':esc(correct)}</p>`}</article>`}
function editQuestion(id){const d=state.data.quizDetail,x=(d?.questions||[]).find(q=>q.questionId===id);if(!x)return notify('ไม่พบคำถาม');const choices=[...UtilsClientArr(x.choicesJson),'','','',''].slice(0,4),correct=x.correctAnswerJson?.value??'',choiceType=['MCQ','TRUE_FALSE'].includes(x.questionType);$('page').innerHTML=title('QUIZ BUILDER','แก้ไขคำถาม',`<button class="secondary" onclick="viewQuiz('${x.quizId}')">ยกเลิก</button>`)+`<form class="card form-card builder-edit" onsubmit="saveQuestion(event,'${id}','${x.quizId}')"><div class="form-grid"><label>ข้อ<input name="sortOrder" type="number" min="1" value="${esc(x.sortOrder||1)}"></label><div class="wide"><label>คำถาม</label>${richEditor('questionText',x.questionText,'พิมพ์คำถาม',x.quizId)}</div><label>ประเภท<select name="questionType" onchange="syncEditQuestionType(this)">${[['MCQ','ปรนัย'],['TRUE_FALSE','ถูก/ผิด'],['SHORT_TEXT','คำตอบสั้น'],['ESSAY','อัตนัย']].map(v=>`<option value="${v[0]}" ${x.questionType===v[0]?'selected':''}>${v[1]}</option>`)}</select></label><label>คะแนน<input name="score" type="number" min="0" value="${esc(x.score)}"></label><div class="wide edit-choice-editor ${choiceType?'':'hidden'}"><strong>คำตอบและเฉลย</strong>${choices.map((c,i)=>`<div class="choice-row"><div class="rich-choice">${richEditor('choice',c,'คำตอบที่ '+(i+1),x.quizId)}</div><label class="correct-picker"><input type="radio" name="correctChoice" value="${i}" ${String(c)===String(correct)&&c!==''?'checked':''}> เลือกเป็นเฉลย</label></div>`).join('')}</div><label class="wide edit-text-answer ${choiceType||x.questionType==='ESSAY'?'hidden':''}">คำตอบที่ถูกต้อง<input name="textCorrect" value="${esc(correct)}"></label><div class="wide"><label>คำอธิบายเฉลย</label>${richEditor('explanation',x.explanation||'','คำอธิบายเฉลย',x.quizId)}</div></div><div class="actions"><button class="primary fit">บันทึกคำถาม</button></div></form>`}
function UtilsClientArr(v){return Array.isArray(v)?v:[]}
function syncEditQuestionType(select){const form=select.form,type=select.value,choice=['MCQ','TRUE_FALSE'].includes(type),rows=[...form.querySelectorAll('.edit-choice-editor .choice-row')];form.querySelector('.edit-choice-editor').classList.toggle('hidden',!choice);form.querySelector('.edit-text-answer').classList.toggle('hidden',choice||type==='ESSAY');rows.forEach(r=>{r.classList.remove('hidden');r.querySelector('input[name="choice"]').disabled=!choice});if(type==='TRUE_FALSE'){['ถูก','ผิด'].forEach((v,i)=>{const editor=rows[i].querySelector('.rich-editor');editor.innerHTML=v;syncRichEditor(editor)});rows.slice(2).forEach(r=>{r.classList.add('hidden');r.querySelector('input[name="choice"]').disabled=true})}}
async function saveQuestion(e,id,quizId){e.preventDefault();syncRichFields(e.target);const f=new FormData(e.target),p=Object.fromEntries(f),choiceType=['MCQ','TRUE_FALSE'].includes(p.questionType);p.questionId=id;if(choiceType){const all=[...e.target.querySelectorAll('input[name="choice"]')].filter(x=>!x.disabled).map(x=>x.value.trim()),idx=Number(f.get('correctChoice'));if(!Number.isInteger(idx)||!all[idx])return notify('กรุณาเลือกเฉลย');p.choicesJson=all.filter(Boolean);p.correctAnswerJson={value:all[idx]}}else{p.choicesJson=[];p.correctAnswerJson={value:String(p.textCorrect||'').trim()}}delete p.choice;delete p.correctChoice;delete p.textCorrect;try{unwrap(await server('quiz.update-question',p));notify('บันทึกคำถามแล้ว');viewQuiz(quizId)}catch(x){notify(x.message)}}
async function deleteQuestion(id,quizId){if(!confirm('ลบคำถามนี้หรือไม่?'))return;try{unwrap(await server('quiz.delete-question',{questionId:id}));notify('ลบคำถามแล้ว');viewQuiz(quizId)}catch(x){notify(x.message)}}
async function deleteQuiz(id){const q=(state.data.quizzes||[]).find(x=>x.quizId===id),name=q&&q.title?' “'+q.title+'”':'';if(!confirm('ยืนยันการลบแบบทดสอบ'+name+'? แบบทดสอบที่มีผู้เริ่มทำแล้วจะไม่สามารถลบได้'))return;try{unwrap(await server('quiz.delete',{quizId:id}));notify('ลบแบบทดสอบแล้ว');quizzes()}catch(x){notify(x.message)}}

function localDate(v){if(!v)return'';const d=new Date(v);if(Number.isNaN(d.getTime()))return'';return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16)}
function showEditQuiz(id){const q=(state.data.quizzes||[]).find(x=>x.quizId===id);if(!q)return notify('ไม่พบแบบทดสอบ');$('page').innerHTML=title('ASSESSMENT','แก้ไขแบบทดสอบ')+`<form class="card form-card" onsubmit="updateQuiz(event,'${id}')"><div class="form-grid"><label class="wide">ชื่อแบบทดสอบ<input name="title" value="${esc(q.title)}" required></label><label class="wide">คำอธิบาย<textarea name="description">${esc(q.description||'')}</textarea></label><label>เวลา (นาที)<input name="timeLimitMinutes" type="number" min="1" value="${esc(q.timeLimitMinutes||30)}" required></label><label>จำนวนครั้ง<input name="attemptLimit" type="number" min="1" value="${esc(q.attemptLimit||1)}" required></label><label>เกณฑ์ผ่าน (%)<input name="passPercentage" type="number" min="0" max="100" value="${esc(q.passPercentage??50)}" required></label><label>เวลาเปิด<input name="openAt" type="datetime-local" value="${localDate(q.openAt)}"></label><label>เวลาปิด<input name="closeAt" type="datetime-local" value="${localDate(q.closeAt)}"></label></div><p class="muted">หากมีผู้เริ่มทำแล้ว ระบบจะไม่อนุญาตให้เปลี่ยนเวลา จำนวนครั้ง หรือเกณฑ์ผ่าน</p><div class="actions"><button type="button" class="secondary" onclick="quizzes()">ยกเลิก</button><button class="primary fit">บันทึกการแก้ไข</button></div></form>`}

function showQuestionForm(id){$('page').innerHTML=title('ASSESSMENT','เพิ่มคำถาม')+`<form id="questionForm" class="card form-card" onsubmit="addQuestion(event,'${id}')"><div class="form-grid"><label>ข้อ<input name="sortOrder" type="number" min="1" value="1"></label><div class="wide"><label>คำถาม</label>${richEditor('questionText','','พิมพ์คำถาม',id)}</div><label>ประเภท<select name="questionType" onchange="syncQuestionType(this.value)"><option value="MCQ">ปรนัย</option><option value="TRUE_FALSE">ถูก/ผิด</option><option value="SHORT_TEXT">คำตอบสั้น</option><option value="ESSAY">อัตนัย</option></select></label><label>คะแนน<input name="score" type="number" min="0" value="1"></label><div id="choiceEditor" class="wide"><strong>ตัวเลือกและเฉลย</strong>${[0,1,2,3].map((i)=>`<div class="choice-row" data-choice-row="${i}"><div class="rich-choice">${richEditor('choice','','คำตอบที่ '+(i+1),id)}</div><label class="correct-picker"><input type="radio" name="correctChoice" value="${i}"> เลือกเป็นเฉลย</label></div>`).join('')}</div><label id="textAnswer" class="wide hidden">คำตอบที่ถูกต้อง<input name="textCorrect"></label><div class="wide"><label>คำอธิบายเฉลย</label>${richEditor('explanation','','คำอธิบายเฉลย',id)}</div></div><div class="actions"><button type="button" class="secondary" onclick="quizzes()">เสร็จแล้ว</button><button class="primary fit">เพิ่มคำถาม</button></div></form>`;syncQuestionType('MCQ')}
function syncQuestionType(type){const choice=['MCQ','TRUE_FALSE'].includes(type),editor=$('choiceEditor'),text=$('textAnswer');editor.classList.toggle('hidden',!choice);text.classList.toggle('hidden',choice||type==='ESSAY');const rows=[...document.querySelectorAll('[data-choice-row]')],inputs=rows.map(r=>r.querySelector('input[name="choice"]')),editors=rows.map(r=>r.querySelector('.rich-editor'));rows.forEach(r=>r.classList.remove('hidden'));inputs.forEach(x=>{x.disabled=!choice});if(type==='TRUE_FALSE'){['ถูก','ผิด'].forEach((v,i)=>{editors[i].innerHTML=v;syncRichEditor(editors[i])});rows.slice(2).forEach(r=>r.classList.add('hidden'));inputs.slice(2).forEach(x=>x.disabled=true)}else if(type==='MCQ'){inputs.forEach((x,i)=>{x.disabled=false;if(['ถูก','ผิด'].includes(x.value)){editors[i].innerHTML='';syncRichEditor(editors[i])}})}}
async function addQuestion(e,id){e.preventDefault();syncRichFields(e.target);const f=new FormData(e.target),p=Object.fromEntries(f),type=p.questionType;p.quizId=id;if(['MCQ','TRUE_FALSE'].includes(type)){const all=[...e.target.querySelectorAll('input[name="choice"]')].filter(x=>!x.disabled).map(x=>String(x.value).trim()),index=Number(f.get('correctChoice'));if(!Number.isInteger(index)||!all[index])return notify('กรุณาเลือกปุ่มเฉลยหลังคำตอบ');p.choicesJson=all.filter(Boolean);p.correctAnswerJson={value:all[index]}}else{p.choicesJson=[];p.correctAnswerJson={value:String(p.textCorrect||'').trim()}}delete p.choice;delete p.correctChoice;delete p.textCorrect;try{unwrap(await server('quiz.add-question',p));notify('เพิ่มคำถามแล้ว');e.target.reset();e.target.querySelectorAll('.rich-editor').forEach(x=>x.innerHTML='');syncRichFields(e.target);syncQuestionType('MCQ')}catch(x){notify(x.message)}}
async function publishQuiz(id){if(!confirm('เผยแพร่แบบทดสอบนี้หรือไม่?'))return;try{unwrap(await server('quiz.publish',{quizId:id}));notify('เผยแพร่แล้ว');quizzes()}catch(x){notify(x.message)}}
async function setQuizPublication(id,published){const action=published?'เผยแพร่':'ยกเลิกการเผยแพร่';if(!confirm(`${action}แบบทดสอบนี้หรือไม่?`))return;try{unwrap(await server('quiz.publication',{quizId:id,published}));notify(`${action}แล้ว`);quizzes()}catch(x){notify(x.message)}}
async function scores(){const manage=can('SYSTEM_ADMIN','SCHOOL_ADMIN','TEACHER'),rows=await server('score.list',yearPayload()).then(unwrap),pending=manage?await server('grade.pending',yearPayload()).then(unwrap):[];$('page').innerHTML=title('REPORT','ผลคะแนน')+(pending.length?`<div class="card form-card"><h3>รอตรวจข้ออัตนัย (${pending.length})</h3>${pending.map(x=>`<form class="question" onsubmit="gradeAnswer(event,'${x.answerId}')"><strong>${esc(x.studentName)} — ${esc(x.questionText)}</strong><p>${esc(x.answerJson?.value||'ไม่ได้ตอบ')}</p><div class="form-grid"><label>คะแนน (เต็ม ${esc(x.maximumScore)})<input name="manualScore" type="number" min="0" max="${esc(x.maximumScore)}" required></label><label>ข้อเสนอแนะ<input name="feedback"></label></div><button class="primary fit">บันทึกคะแนน</button></form>`).join('')}</div>`:'')+(rows.length?table(['ผู้เรียน','แบบทดสอบ','คะแนน','ร้อยละ','ผล','เผยแพร่'],rows.map(x=>`<tr><td>${esc(x.studentName)}</td><td>${esc(x.quizTitle)}</td><td>${esc(x.finalScore)}/${esc(x.maximumScore)}</td><td>${Number(x.percentage||0).toFixed(1)}%</td><td>${x.passed?'ผ่าน':'ไม่ผ่าน'}</td><td>${x.published?'แล้ว':manage?`<button class="secondary" onclick="publishScore('${x.scoreId}')">เผยแพร่</button>`:'รอประกาศ'}</td></tr>`)):empty('ยังไม่มีผลคะแนน'))}
async function gradeAnswer(e,id){e.preventDefault();const p=Object.fromEntries(new FormData(e.target));p.answerId=id;try{unwrap(await server('grade.answer',p));notify('บันทึกคะแนนแล้ว');scores()}catch(x){notify(x.message)}}
async function publishScore(id){try{unwrap(await server('score.publish',{scoreId:id}));notify('เผยแพร่ผลคะแนนแล้ว');scores()}catch(x){notify(x.message)}}
async function system(){const h=await server('system.health').then(unwrap);$('page').innerHTML=title('SYSTEM','สถานะระบบ')+`<div class="card form-card"><pre>${esc(JSON.stringify(h,null,2))}</pre></div>`}
async function startExam(id){try{state.exam=unwrap(await server('exam.start',{quizId:id}));renderExam()}catch(x){notify(x.message)}}
function renderExam(){const e=state.exam;$('examContent').innerHTML=`<span class="eyebrow">EXAM</span><h2>${esc(e.quiz.title)}</h2><form id="examForm">${e.questions.map((q,i)=>question(q,i)).join('')}<div class="exam-actions"><button type="button" class="secondary" onclick="closeExam()">พักไว้</button><button class="primary fit">ส่งคำตอบ</button></div></form>`;$('examForm').onsubmit=submitExam;$('examModal').classList.remove('hidden')}
function question(q,i){const opts=Array.isArray(q.choicesJson)?q.choicesJson:[];return `<div class="question"><div><strong>${i+1}.</strong> <span class="rich-content">${safeRich(q.questionText)}</span></div>${opts.length?opts.map(o=>{const value=o.value??o,label=o.label??o;return `<label><input type="${q.questionType==='MULTIPLE_ANSWER'?'checkbox':'radio'}" name="q_${q.questionId}" value="${esc(value)}"> <span class="rich-content">${safeRich(label)}</span></label>`}).join(''):`<label><input name="q_${q.questionId}" placeholder="พิมพ์คำตอบ"></label>`}</div>`}
async function submitExam(e){e.preventDefault();const b=e.submitter;busy(b,true,'ส่งคำตอบ');try{for(const q of state.exam.questions){const inputs=[...document.querySelectorAll(`[name="q_${CSS.escape(q.questionId)}"]:checked`)];const single=document.querySelector(`[name="q_${CSS.escape(q.questionId)}"]`),answer=inputs.length>1?{values:inputs.map(x=>x.value)}:{value:(inputs[0]||single)?.value||''};unwrap(await server('exam.save-answer',{attemptId:state.exam.attempt.attemptId,questionId:q.questionId,answerJson:answer}))}const s=unwrap(await server('exam.submit',{attemptId:state.exam.attempt.attemptId}));closeExam();notify(s.percentage==null?'ส่งข้อสอบแล้ว รอครูประกาศผล':`ส่งข้อสอบแล้ว ${Number(s.percentage).toFixed(1)}%`);go('scores')}catch(x){notify(x.message)}finally{busy(b,false,'ส่งคำตอบ')}}
function closeExam(){$('examModal').classList.add('hidden')}
$('loginForm').onsubmit=login;$('logoutButton').onclick=()=>signOut();$('refreshButton').onclick=()=>go(state.page);init();
</script>
